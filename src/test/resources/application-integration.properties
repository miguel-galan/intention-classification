# Copy this file's keys into IntelliJ Run Configuration VM options or pass with -D...

# Real LLM endpoint
sangalan.classify.llm.url=http://localhost:12434/engines/llama.cpp/v1/chat/completions
sangalan.classify.llm.model=hf.co/openresearchtools/qwen3.5-4b-gguf:q4_k_m
#sangalan.classify.llm.url=https://api.cerebras.ai/v1/chat/completions
#sangalan.classify.llm.model=gpt-oss-120b
#sangalan.classify.llm.api-key=
#sangalan.classify.llm.auth-header=Authorization
#sangalan.classify.llm.auth-scheme=Bearer
sangalan.classify.llm.timeout-ms=420000

# Optional override for the system prompt used in integration test
sangalan.classify.llm.system-prompt=You classify task-management user requests and return JSON with intent and parameters.
sangalan.classify.llm.default-option=UNKNOWN
sangalan.classify.llm.options[0]=LIST_USERS_WITH_ACTIVE_TASKS
sangalan.classify.llm.options[1]=LIST_TASKS_EXPIRING_IN_DAYS
sangalan.classify.llm.options[2]=LIST_TOP_DOCUMENTS_IN_TASKS
sangalan.classify.llm.options[3]=LIST_EXPIRED_TASKS
sangalan.classify.llm.options[4]=LIST_LAST_ASSIGNED_TASKS
sangalan.classify.llm.options[5]=LIST_TASKS_ASSIGNED_TO_USER
sangalan.classify.llm.options[6]=LIST_TASKS_BY_STATUS_AND_USER
sangalan.classify.llm.options[7]=UNKNOWN
