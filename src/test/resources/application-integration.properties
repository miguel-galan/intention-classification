# Copy this file's keys into IntelliJ Run Configuration VM options or pass with -D...
# The integration test only runs when llm.integration.enabled=true

llm.integration.enabled=false

# Real LLM endpoint
llm.integration.url=http://localhost:12434/engines/llama.cpp/v1/chat/completions
llm.integration.model=qwen2.5:7b
llm.integration.timeout-ms=30000

# Optional override for the system prompt used in integration test
llm.integration.system-prompt=You classify task-management user requests and return JSON with intent and parameters.

# Manual prompt used during the real integration run
llm.integration.user-prompt=List all the tasks with status pending to the user Maria
